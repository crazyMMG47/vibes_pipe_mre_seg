data:
  manifest_path: /home/smooi/Desktop/vibes_pipe/experiments/toast_data/workspace_root/manifest_with_noise.json

preprocess:
  target_spacing: [1.5, 1.5, 1.5]
  target_size: [128, 128, 64]

  dataset:
    label_mode: "gt"
    pseudo_dir: null

  clahe:
    enabled: true
    clip_limit: 2.0
    tile_grid_size: [8, 8]
    percentile_clip: [1, 99]
    eps: 1.0e-8

  resample:
    enabled: true
    order_image: 1
    order_label: 0
    prefilter: false

  label:
    binarize_threshold: 0.5
    dtype: float32

  normalize:
    enabled: true
    mask_positive_only: true
    eps: 1.0e-8

augmentation:
  noise_augment:
    enabled: true
    strength_range: [0.05, 0.15]
    apply_prob: 0.8

  spatial_transforms:
    rotation_range: [-10, 10]
    scale_range: [0.95, 1.05]

dataloader:
  batch_size: 2
  num_workers: 0
  pin_memory: true